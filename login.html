<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<title>Login</title>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

<div class="card w-96 bg-white shadow-xl p-6 justify-center items-center space-y-10">
<img src="./assets/github-logo.png">
<h2 class="text-2xl font-bold text-center mb-2">Github Issues Tracker</h2>

<p class="text-center text-gray-500 mb-4">
Sign in to manage your issues
</p>

<form id="loginForm">

<input
id="username"
type="text"
placeholder="Enter Username"
class="input input-bordered w-full mb-3"
/>

<input
id="password"
type="password"
placeholder="Enter Password"
class="input input-bordered w-full mb-3"
/>

<button class="btn btn-primary w-full">Sign In</button>

</form>

<div class="mt-4 text-sm text-gray-500">

<p>Username: <b>admin</b></p>
<p>Password: <b>admin123</b></p>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
